name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────
  # BACKEND: Lint + Type check
  # ─────────────────────────────────────────────────
  backend-lint:
    name: "Backend — Lint (ruff + mypy)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff check
        run: ruff check app/ tests/

      - name: Mypy
        run: mypy app/ --ignore-missing-imports

  # ─────────────────────────────────────────────────
  # BACKEND: Tests com PostgreSQL
  # ─────────────────────────────────────────────────
  backend-test:
    name: "Backend — Tests (PostgreSQL)"
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          SECRET_KEY: "ci-test-secret-key-with-32-chars-minimum"
        # TODO: Habilitar --cov-fail-under=70 quando cobertura atingir 70%
        run: pytest tests/ --tb=short -q --cov=app --cov-report=term-missing

  # ─────────────────────────────────────────────────
  # BACKEND: Migration check (upgrade + downgrade)
  # ─────────────────────────────────────────────────
  backend-migrations:
    name: "Backend — Migration check"
    runs-on: ubuntu-latest
    needs: backend-lint
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: amigao_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migration check
        env:
          POSTGRES_SERVER: localhost
          POSTGRES_PORT: "5432"
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: amigao_ci
          SECRET_KEY: "ci-migration-secret-key-32-chars-min"
        run: |
          alembic upgrade head
          alembic downgrade base
          alembic upgrade head

  # ─────────────────────────────────────────────────
  # FRONTEND (Painel Interno — Vite + React)
  # ─────────────────────────────────────────────────
  frontend-ci:
    name: "Frontend — Lint + Typecheck + Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint --max-warnings=0 .

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────────
  # CLIENT PORTAL (Next.js — Portal do Tenant)
  # ─────────────────────────────────────────────────
  client-portal-ci:
    name: "Client Portal — Lint + Typecheck + Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client-portal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: client-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint .

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────────
  # MOBILE (Expo — App de Campo)
  # ─────────────────────────────────────────────────
  mobile-ci:
    name: "Mobile — Lint + Typecheck"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Expo lint
        run: npx expo lint

      - name: TypeScript check
        run: npx tsc --noEmit
