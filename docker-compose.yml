services:
  db:
    build:
      context: .
      dockerfile: docker/db/Dockerfile
    image: amigao_do_meio_ambiente-db
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-pgpass2026}"
      POSTGRES_DB: "${POSTGRES_DB:-amigao_db}"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d amigao_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass2026}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY:-minioadmin}"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    # mempalace removido em 2026-04-23 (supply-chain red flags). Ver docs/adr/adr_mempalace_REVOKED.md.
    command: sh -c "python -m app.db.init_db && python seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: "${ENVIRONMENT:-development}"
      SERVICE_NAME: api
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      SLOW_REQUEST_THRESHOLD_MS: "${SLOW_REQUEST_THRESHOLD_MS:-500}"
      SLOW_REQUEST_THRESHOLD_OVERRIDES: "${SLOW_REQUEST_THRESHOLD_OVERRIDES:-/api/v1/auth/login=2000,/api/v1/documents/upload-url=800,/api/v1/documents/confirm-upload=900}"
      ALERT_WEBHOOK_URL: "${ALERT_WEBHOOK_URL:-}"
      ALERT_WEBHOOK_TIMEOUT_SECONDS: "${ALERT_WEBHOOK_TIMEOUT_SECONDS:-2.0}"
      ALERT_WEBHOOK_AUTH_HEADER: "${ALERT_WEBHOOK_AUTH_HEADER:-Authorization}"
      ALERT_WEBHOOK_AUTH_TOKEN: "${ALERT_WEBHOOK_AUTH_TOKEN:-}"
      ALERT_WEBHOOK_SIGNING_SECRET: "${ALERT_WEBHOOK_SIGNING_SECRET:-}"
      ALERT_WEBHOOK_MIN_SEVERITY: "${ALERT_WEBHOOK_MIN_SEVERITY:-error}"
      PROMETHEUS_QUEUE_NAMES: "${PROMETHEUS_QUEUE_NAMES:-celery}"
      POSTGRES_SERVER: "${DOCKER_POSTGRES_SERVER:-db}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-pgpass2026}"
      POSTGRES_DB: "${POSTGRES_DB:-amigao_db}"
      POSTGRES_PORT: "${DOCKER_POSTGRES_PORT:-5432}"
      REDIS_URL: "${DOCKER_REDIS_URL:-redis://:redispass2026@redis:6379/0}"
      MINIO_SERVER: "${DOCKER_MINIO_SERVER:-minio:9000}"
      MINIO_PUBLIC_URL: "${MINIO_PUBLIC_URL:-http://localhost:9000}"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      MINIO_SECURE: "${MINIO_SECURE:-False}"
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY must be set in .env or shell}"
      ACCESS_TOKEN_EXPIRE_MINUTES: "${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}"
      SMTP_TLS: "${SMTP_TLS:-True}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_HOST: "${SMTP_HOST:-sandbox.smtp.mailtrap.io}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      EMAILS_FROM_EMAIL: "${EMAILS_FROM_EMAIL:-noreply@amigao.com}"
      EMAILS_FROM_NAME: "${EMAILS_FROM_NAME:-Amigao do Meio Ambiente}"
      SEED_ADMIN_PASSWORD: "${SEED_ADMIN_PASSWORD:-}"
      SEED_CONSULTANT_PASSWORD: "${SEED_CONSULTANT_PASSWORD:-}"
      SEED_CLIENT_PASSWORD: "${SEED_CLIENT_PASSWORD:-}"
      SEED_FIELD_PASSWORD: "${SEED_FIELD_PASSWORD:-}"
      SEED_RESET_PASSWORDS: "${SEED_RESET_PASSWORDS:-false}"
      CLIENT_PORTAL_URL: "${CLIENT_PORTAL_URL:-http://localhost:3000/dashboard}"
      BACKEND_CORS_ORIGINS: "${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}"
      AI_ENABLED: "${AI_ENABLED:-false}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      AI_DEFAULT_MODEL: "${AI_DEFAULT_MODEL:-gpt-4o-mini}"
      AI_FALLBACK_MODEL: "${AI_FALLBACK_MODEL:-gemini/gemini-1.5-flash}"
      AI_MAX_TOKENS: "${AI_MAX_TOKENS:-2048}"
      AI_TEMPERATURE: "${AI_TEMPERATURE:-0.2}"
      AI_TIMEOUT_SECONDS: "${AI_TIMEOUT_SECONDS:-30}"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app worker --loglevel=info --pool=solo
    # mempalace volume removido em 2026-04-23 (supply-chain red flags).
    environment:
      ENVIRONMENT: "${ENVIRONMENT:-development}"
      SERVICE_NAME: worker
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      SLOW_REQUEST_THRESHOLD_MS: "${SLOW_REQUEST_THRESHOLD_MS:-500}"
      SLOW_REQUEST_THRESHOLD_OVERRIDES: "${SLOW_REQUEST_THRESHOLD_OVERRIDES:-/api/v1/auth/login=2000,/api/v1/documents/upload-url=800,/api/v1/documents/confirm-upload=900}"
      ALERT_WEBHOOK_URL: "${ALERT_WEBHOOK_URL:-}"
      ALERT_WEBHOOK_TIMEOUT_SECONDS: "${ALERT_WEBHOOK_TIMEOUT_SECONDS:-2.0}"
      ALERT_WEBHOOK_AUTH_HEADER: "${ALERT_WEBHOOK_AUTH_HEADER:-Authorization}"
      ALERT_WEBHOOK_AUTH_TOKEN: "${ALERT_WEBHOOK_AUTH_TOKEN:-}"
      ALERT_WEBHOOK_SIGNING_SECRET: "${ALERT_WEBHOOK_SIGNING_SECRET:-}"
      ALERT_WEBHOOK_MIN_SEVERITY: "${ALERT_WEBHOOK_MIN_SEVERITY:-error}"
      PROMETHEUS_QUEUE_NAMES: "${PROMETHEUS_QUEUE_NAMES:-celery}"
      POSTGRES_SERVER: "${DOCKER_POSTGRES_SERVER:-db}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-pgpass2026}"
      POSTGRES_DB: "${POSTGRES_DB:-amigao_db}"
      POSTGRES_PORT: "${DOCKER_POSTGRES_PORT:-5432}"
      REDIS_URL: "${DOCKER_REDIS_URL:-redis://:redispass2026@redis:6379/0}"
      MINIO_SERVER: "${DOCKER_MINIO_SERVER:-minio:9000}"
      MINIO_PUBLIC_URL: "${MINIO_PUBLIC_URL:-http://localhost:9000}"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      MINIO_SECURE: "${MINIO_SECURE:-False}"
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY must be set in .env or shell}"
      ACCESS_TOKEN_EXPIRE_MINUTES: "${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}"
      SMTP_TLS: "${SMTP_TLS:-True}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_HOST: "${SMTP_HOST:-sandbox.smtp.mailtrap.io}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      EMAILS_FROM_EMAIL: "${EMAILS_FROM_EMAIL:-noreply@amigao.com}"
      EMAILS_FROM_NAME: "${EMAILS_FROM_NAME:-Amigao do Meio Ambiente}"
      CLIENT_PORTAL_URL: "${CLIENT_PORTAL_URL:-http://localhost:3000/dashboard}"
      BACKEND_CORS_ORIGINS: "${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}"
      AI_ENABLED: "${AI_ENABLED:-false}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      AI_DEFAULT_MODEL: "${AI_DEFAULT_MODEL:-gpt-4o-mini}"
      AI_FALLBACK_MODEL: "${AI_FALLBACK_MODEL:-gemini/gemini-1.5-flash}"
      AI_MAX_TOKENS: "${AI_MAX_TOKENS:-2048}"
      AI_TEMPERATURE: "${AI_TEMPERATURE:-0.2}"
      AI_TIMEOUT_SECONDS: "${AI_TIMEOUT_SECONDS:-30}"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  client-portal:
    build:
      context: ./client-portal
      dockerfile: Dockerfile
      args:
        API_BACKEND_URL: "${API_BACKEND_URL:-http://api:8000}"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      API_BACKEND_URL: "${API_BACKEND_URL:-http://api:8000}"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
  # mempalace_data removido em 2026-04-23 (supply-chain red flags). Volume remanescente em ambientes
  # antigos pode ser purgado com: docker volume rm amigao_do_meio_ambiente_mempalace_data
