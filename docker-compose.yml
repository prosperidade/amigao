services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      POSTGRES_DB: "${POSTGRES_DB:-amigao_db}"
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d amigao_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY:-minioadmin}"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "python -m app.db.init_db && python seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: "${ENVIRONMENT:-development}"
      SERVICE_NAME: api
      POSTGRES_SERVER: "${DOCKER_POSTGRES_SERVER:-db}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      POSTGRES_DB: "${POSTGRES_DB:-amigao_db}"
      POSTGRES_PORT: "${DOCKER_POSTGRES_PORT:-5432}"
      REDIS_URL: "${DOCKER_REDIS_URL:-redis://redis:6379/0}"
      MINIO_SERVER: "${DOCKER_MINIO_SERVER:-minio:9000}"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      MINIO_SECURE: "${MINIO_SECURE:-False}"
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY must be set in .env or shell}"
      ACCESS_TOKEN_EXPIRE_MINUTES: "${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}"
      SMTP_TLS: "${SMTP_TLS:-True}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_HOST: "${SMTP_HOST:-sandbox.smtp.mailtrap.io}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      EMAILS_FROM_EMAIL: "${EMAILS_FROM_EMAIL:-noreply@amigao.com}"
      EMAILS_FROM_NAME: "${EMAILS_FROM_NAME:-Amigao do Meio Ambiente}"
      CLIENT_PORTAL_URL: "${CLIENT_PORTAL_URL:-http://localhost:3000/dashboard}"
      BACKEND_CORS_ORIGINS: "${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A app.core.celery_app worker --loglevel=info --pool=solo
    environment:
      ENVIRONMENT: "${ENVIRONMENT:-development}"
      SERVICE_NAME: worker
      POSTGRES_SERVER: "${DOCKER_POSTGRES_SERVER:-db}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-password}"
      POSTGRES_DB: "${POSTGRES_DB:-amigao_db}"
      POSTGRES_PORT: "${DOCKER_POSTGRES_PORT:-5432}"
      REDIS_URL: "${DOCKER_REDIS_URL:-redis://redis:6379/0}"
      MINIO_SERVER: "${DOCKER_MINIO_SERVER:-minio:9000}"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      MINIO_SECURE: "${MINIO_SECURE:-False}"
      SECRET_KEY: "${SECRET_KEY:?SECRET_KEY must be set in .env or shell}"
      ACCESS_TOKEN_EXPIRE_MINUTES: "${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}"
      SMTP_TLS: "${SMTP_TLS:-True}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_HOST: "${SMTP_HOST:-sandbox.smtp.mailtrap.io}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      EMAILS_FROM_EMAIL: "${EMAILS_FROM_EMAIL:-noreply@amigao.com}"
      EMAILS_FROM_NAME: "${EMAILS_FROM_NAME:-Amigao do Meio Ambiente}"
      CLIENT_PORTAL_URL: "${CLIENT_PORTAL_URL:-http://localhost:3000/dashboard}"
      BACKEND_CORS_ORIGINS: "${BACKEND_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  client-portal:
    build:
      context: ./client-portal
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      API_BACKEND_URL: "${API_BACKEND_URL:-http://api:8000}"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
